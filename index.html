<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chalk — Free CS Courses</title>
<style>
/* ── Reset & Tokens ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --font-display: Georgia, 'Times New Roman', serif;
  --font-body:    -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono:    'SF Mono', 'Fira Code', 'Consolas', monospace;
  --bg:         #FFFFFF;
  --bg-warm:    #F8F8F5;
  --text:       #1A1A1A;
  --text-secondary: #3A3A3A;
  --muted:      #6B6B6B;
  --border:     #E5E5E0;
  --border-hover: #CCCCCC;
  --accent:     #1A6641;
  --accent-tint: #EBF5EF;
  --accent-border: #B0CFC0;
  --shadow-sm:  0 1px 3px rgba(0,0,0,0.07);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.08);
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
  scrollbar-width: none;
}
::-webkit-scrollbar { display: none; }

/* ── Main Layout ─────────────────────────────────────────────── */
.main {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Top Navbar ──────────────────────────────────────────────── */
.navbar {
  z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 24px;
}
.logo {
  font-family: var(--font-display);
  font-size: 24px;
  letter-spacing: 1px;
  color: var(--text);
  line-height: 1;
  flex-shrink: 0;
  cursor: default;
  user-select: none;
}
.logo em { color: var(--accent); font-style: normal; }

.search-wrap {
  position: relative;
  flex: 1;
  max-width: 400px;
}
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 14px;
  pointer-events: none;
}
.search {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px 16px 8px 38px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.search::placeholder { color: var(--muted); }
.search:focus { border-color: var(--accent); }

.nav-counter {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--muted);
  flex-shrink: 0;
  white-space: nowrap;
}

/* ── Category Filter Strip ───────────────────────────────────── */
.category-strip {
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  background: var(--bg);
  flex-shrink: 0;
}
.category-strip::-webkit-scrollbar { display: none; }

.chip {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  user-select: none;
}
.chip:hover {
  border-color: var(--border-hover);
  background: var(--bg-warm);
}
.chip.active {
  background: var(--accent);
  color: #FFFFFF;
  border-color: var(--accent);
}

/* ── Hero ────────────────────────────────────────────────────── */
.hero {
  padding: 64px 24px 48px;
  text-align: center;
  display: none;
  max-width: 640px;
  margin: 0 auto;
}
.hero.visible { display: block; }
.hero-title {
  font-family: var(--font-display);
  font-size: clamp(32px, 5vw, 48px);
  line-height: 1.2;
  color: var(--text);
  margin-bottom: 12px;
  font-weight: normal;
}
.hero-desc {
  font-size: 16px;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 24px;
}
.hero-stats {
  display: flex;
  gap: 32px;
  justify-content: center;
}
.hero-stat {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--muted);
}
.hero-stat strong {
  color: var(--accent);
  font-size: 15px;
}

/* ── Search Results Line ─────────────────────────────────────── */
.results-line {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--muted);
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 24px 0;
  display: none;
}
.results-line.visible { display: block; }

/* ── Course Grid ─────────────────────────────────────────────── */
.content-scroll {
  flex: 1;
  overflow-y: auto;
}
.grid-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* ── Card ────────────────────────────────────────────────────── */
.card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: border-color .15s, transform .15s, box-shadow .15s;
  display: flex;
  flex-direction: column;
  padding: 20px;
}
.card:hover {
  border-color: var(--accent-border);
  transform: translateY(-1px);
  box-shadow: var(--shadow-hover);
}
.card-emoji {
  font-size: 28px;
  line-height: 1;
  margin-bottom: 12px;
}
.card-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.5;
  color: var(--text);
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-inst {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 16px;
}
.card-bottom {
  margin-top: auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-platform {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: var(--bg-warm);
}
.card-category {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  text-align: right;
  max-width: 50%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Card fade-in ────────────────────────────────────────────── */
.card { opacity: 0; animation: fadeIn .3s ease forwards; }
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ── Empty State ─────────────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 80px 40px;
  color: var(--muted);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 15px; }

/* ── Modal Overlay ───────────────────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.overlay.open { display: flex; }

/* ── Modal Box ───────────────────────────────────────────────── */
.modal {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  animation: modalIn .2s ease;
  display: flex;
  flex-direction: column;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(.97) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  padding: 20px 24px 16px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.modal-chip {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 4px;
  background: var(--accent-tint);
  color: var(--accent);
}
.close-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  width: 32px;
  height: 32px;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  transition: all .15s;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.close-btn:hover { color: var(--text); border-color: var(--border-hover); }

.modal-body {
  padding: 0 24px 20px;
}
.modal-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--text);
  margin-bottom: 6px;
}
.modal-meta {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
}
.modal-divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 16px;
}
.modal-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 16px;
}
.modal-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.tag {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  color: var(--muted);
}
.modal-cta {
  display: block;
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #FFFFFF;
  border: none;
  border-radius: 6px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  text-decoration: none;
  cursor: pointer;
  transition: background .15s;
}
.modal-cta:hover { background: #155534; }

/* ── Attribution Footer ───────────────────────────────────────── */
.attr-footer {
  text-align: center;
  padding: 14px;
  border-top: 1px solid #E5E5E0;
  font-family: var(--font-mono);
  font-size: 10px;
  color: #AAAAAA;
  flex-shrink: 0;
  background: #FFFFFF;
}

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 768px) {
  .navbar { padding: 0 16px; gap: 12px; }
  .search-wrap { max-width: none; }
  .nav-counter { display: none; }
  .category-strip { padding: 10px 16px; }
  .grid-wrap { padding: 20px 16px; }
  .grid { grid-template-columns: 1fr; }
  .hero { padding: 40px 16px 32px; }
  .hero-title { font-size: clamp(26px, 5vw, 36px); }
  .results-line { padding: 16px 16px 0; }
}

@media (max-width: 480px) {
  .overlay {
    align-items: flex-end;
    padding: 0;
  }
  .modal {
    max-width: 100%;
    max-height: 85vh;
    border-radius: 12px 12px 0 0;
    animation: sheetUp .25s ease;
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
}
</style>
</head>
<body>

<div class="main">

<nav class="navbar">

</div>

</div>

// ── App State ─────────────────────────────────────────────────────────────────
let activeCategory = null;
let activeSort = 'all';
let searchQuery = '';

// ── Build category map ────────────────────────────────────────────────────────
function getCategories() {
  const map = {};
  COURSES.forEach(c => {
    if (!map[c.c]) map[c.c] = 0;
    map[c.c]++;
  });
  return map;
}

// ── Render category chip strip ────────────────────────────────────────────────
function renderNav() {
  const cats = getCategories();
  const nav = document.getElementById('navList');
  const allCount = COURSES.length;

  let html = `
    <div class="chip ${activeCategory === null ? 'active' : ''}" onclick="selectCategory(null)">
      ✦ All
    </div>
  `;

  Object.entries(cats).forEach(([cat, count]) => {
    const active = activeCategory === cat ? 'active' : '';
    const course = COURSES.find(c => c.c === cat);
    const em = course ? course.e : '📚';
    html += `
      <div class="chip ${active}" onclick="selectCategory('${cat.replace(/'/g, "\\'")}')">
        ${em} ${cat}
      </div>
    `;
  });

  nav.innerHTML = html;

  // Update counter in navbar
  document.getElementById('navCounter').textContent =
    `${allCount} courses · ${Object.keys(cats).length} categories`;
}

// ── Filter courses ────────────────────────────────────────────────────────────
function getFiltered() {
  return COURSES.filter(c => {
    const catMatch = !activeCategory || c.c === activeCategory;
    const sortMatch = activeSort === 'all' || c.p === activeSort;
    const q = searchQuery.toLowerCase();
    const searchMatch = !q || c.t.toLowerCase().includes(q) || c.c.toLowerCase().includes(q) || (c.i && c.i.toLowerCase().includes(q));
    return catMatch && sortMatch && searchMatch;
  });
}

// ── Render course grid ────────────────────────────────────────────────────────
function renderGrid() {
  const courses = getFiltered();
  const grid = document.getElementById('courseGrid');
  const empty = document.getElementById('emptyState');
  const hero = document.getElementById('hero');
  const resultsLine = document.getElementById('resultsLine');

  if (activeCategory === null && !searchQuery) {
    hero.classList.add('visible');
    resultsLine.classList.remove('visible');
  } else {
    hero.classList.remove('visible');
    if (searchQuery) {
      resultsLine.textContent = `${courses.length} result${courses.length !== 1 ? 's' : ''} for '${searchQuery}'`;
      resultsLine.classList.add('visible');
    } else {
      resultsLine.classList.remove('visible');
    }
  }

  if (courses.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = courses.map((c, i) => {
    const isYT = c.p === 'youtube';
    const platBadge = isYT
      ? '<span class="card-platform">▶ YouTube</span>'
      : '<span class="card-platform">↗ External</span>';
    return `
      <div class="card" onclick="openCourse(${COURSES.indexOf(c)})">
        <div class="card-emoji">${c.e}</div>
        <div class="card-title">${c.t}</div>
        <div class="card-inst">${c.i || 'Open University'}</div>
        <div class="card-bottom">
          ${platBadge}
          <span class="card-category">${c.c}</span>
        </div>
      </div>
    `;
  }).join('');
}

// ── Category select ───────────────────────────────────────────────────────────
function selectCategory(cat) {
  activeCategory = cat;
  activeSort = 'all';
  renderNav();
  renderGrid();
  document.querySelector('.content-scroll').scrollTop = 0;
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  if (searchQuery) activeCategory = null;
  renderNav();
  renderGrid();
});

// ── Open course modal ─────────────────────────────────────────────────────────
function openCourse(idx) {
  const c = COURSES[idx];

  document.getElementById('pCategory').textContent = c.e + ' ' + c.c;
  document.getElementById('pTitle').textContent = c.t;
  document.getElementById('pInst').textContent = (c.i || '') + ' · ' + (c.p === 'youtube' ? 'YouTube' : 'External');

  const btn = document.getElementById('pOpenBtn');
  btn.href = c.u;
  btn.textContent = c.p === 'youtube' ? '▶ Open on YouTube →' : 'Open Course →';

  document.getElementById('pTags').innerHTML = [
    `<span class="tag">${c.c}</span>`,
    c.i ? `<span class="tag">${c.i}</span>` : '',
    `<span class="tag">${c.p === 'youtube' ? 'YouTube' : 'External'}</span>`,
  ].join('');

  document.getElementById('pDesc').textContent =
    `A free university-level course from ${c.i || 'an open institution'}. ` +
    `Click below to access the full lecture series on ${c.p === 'youtube' ? 'YouTube' : 'the course website'}.`;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closePlayer(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  document.getElementById('statCourses').textContent = COURSES.length;
  document.getElementById('statCats').textContent = Object.keys(getCategories()).length;
  renderNav();
  renderGrid();
}

init();
</script>
